name: Publish SDK GitHub Release

on:
  push:
    tags:
      - "sdk/v*"

permissions:
  contents: write

jobs:
  update_release:
    if: github.repository == 'anam-org/kmp-sdk'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TERM: dumb

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Add artifact version to ENV
        run: echo "VERSION=$(./gradlew -q printVersion)" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        if: success() && !endsWith(env.VERSION, '-SNAPSHOT')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sdk/v${{ env.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

