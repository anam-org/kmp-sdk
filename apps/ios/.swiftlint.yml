# SwiftLint Configuration for Anam iOS App

# Rules included by default in SwiftLint
opt_in_rules:
  # Additional rules you might want to enable
  - empty_count
  - empty_string
  - force_unwrapping
  - function_default_parameter_at_end
  - overridden_super_call
  - prohibited_super_call
  - vertical_parameter_alignment_on_call
  
# Disable specific rules
disabled_rules:
  # Disable if you want to allow force unwrapping
  # - force_unwrapping
  
# Configure rules
line_length:
  warning: 120
  error: 200
  ignores_function_declarations: true
  ignores_comments: true

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 100
  error: 150

function_parameter_count:
  warning: 6
  error: 8

type_body_length:
  warning: 300
  error: 500

# Exclude patterns
excluded:
  - Pods
  - DerivedData
  - build
  - .build

# Reporter type (can be xcode, json, csv, checkstyle, junit, html, emoji, sonarqube, markdown)
reporter: "xcode"

