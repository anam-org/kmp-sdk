[versions]
agp = "9.0.0"
androidx-activity = "1.12.2"
androidx-compose-bom = "2026.01.00"
androidx-lifecycle = "2.9.6"
androidx-navigation = "2.9.1"
compose-multiplatform = "1.10.0"
compose-rules = "0.4.27"
kotlin = "2.2.21"
ktlint = "1.6.0"
spotless = "8.2.1"
multiplatform-settings = "1.3.0"
moko-permissions = "0.20.1"
ktor = "3.3.3"
ktorfit = "2.7.2"
webrtc = "0.125.11"
coil = "3.3.0"
dokka = "2.1.0"
licensee = "1.14.1"
buildConfig = "6.0.7"

[libraries]
kotlin-test = { module = "org.jetbrains.kotlin:kotlin-test", version.ref = "kotlin" }
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version = "1.10.2" }
kotlinx-coroutines-test = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version = "1.10.2" }
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version = "1.9.0" }
androidx-activity-compose = { module = "androidx.activity:activity-compose", version.ref = "androidx-activity" }
androidx-compose-bom = { module = "androidx.compose:compose-bom", version.ref = "androidx-compose-bom"}
